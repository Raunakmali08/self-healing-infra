# alertmanager/alertmanager.yml

global:
  resolve_timeout: 1m

route:
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 5m
  receiver: 'local-log'

  routes:
    - match:
        severity: critical
      receiver: 'webhook-remediation'

    - match:
        severity: warning
      receiver: 'local-log'

receivers:
  # Clean webhook receiver for self-healing (already working)
  - name: 'webhook-remediation'
    webhook_configs:
      - url: 'http://webhook-receiver:5001/webhook'
        send_resolved: false

  # Simple local log — no external services needed for demo
  - name: 'local-log'
    webhook_configs:
      - url: 'http://webhook-receiver:5001/webhook'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service']

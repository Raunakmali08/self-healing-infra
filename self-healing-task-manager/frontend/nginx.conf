# Default server — WHY single file in conf.d: matches official nginx image layout.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API to Node — WHY /api prefix: static UI and API share one browser origin
    # (port 80) so fetch('/api/...') works without CORS configuration on the backend.
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Exact paths — WHY: without this, `location /` + SPA fallback would serve index.html
    # for /health and /metrics (breaking probes and Prometheus scrapes through :80).
    location = /health {
        proxy_pass http://backend:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /metrics {
        proxy_pass http://backend:3000/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — WHY: Vite/React is a single index.html; deep links still work on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

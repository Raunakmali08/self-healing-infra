groups:
  - name: app_alerts
    rules:
      - alert: TaskManagerDown
        expr: up{job="task-manager"} == 0
        for: 30s
        labels:
          severity: critical
          service: task-manager
        annotations:
          summary: "Task manager is DOWN"
          description: "The task-manager backend has been unreachable for more than 30 seconds."

      - alert: TaskManagerHigh5xxRate
        expr: sum(rate(http_requests_total{job="task-manager",status_code=~"5.."}[5m])) / clamp_min(sum(rate(http_requests_total{job="task-manager"}[5m])), 1e-9) > 0.05
        for: 5m
        labels:
          severity: warning
          service: task-manager
        annotations:
          summary: "Task manager 5xx rate is elevated"
          description: "More than 5% of task-manager requests have returned 5xx responses for 5 minutes."

  - name: infrastructure_alerts
    rules:
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 30s
        labels:
          severity: critical
          service: prometheus
        annotations:
          summary: "Prometheus is DOWN"

      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 30s
        labels:
          severity: critical
          service: alertmanager
        annotations:
          summary: "Alertmanager is DOWN"

      - alert: NodeExporterDown
        expr: up{job="node-exporter"} == 0
        for: 30s
        labels:
          severity: warning
          service: node-exporter
        annotations:
          summary: "Node Exporter is DOWN"
